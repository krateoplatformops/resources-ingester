apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "resources-ingester.fullname" . }}-events
  labels:
    {{- include "resources-ingester.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "resources-ingester.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "resources-ingester.fullname" . }}-events
  apiGroup: rbac.authorization.k8s.io
